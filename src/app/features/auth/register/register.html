<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0">📝 Create New Account</h4>
        </div>
        <div class="card-body p-4">
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show">
            {{ errorMessage }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" [(ngModel)]="registerData.fullName" name="fullName" required placeholder="Enter your full name">
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="registerData.email" name="email" required placeholder="Enter your email">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" [(ngModel)]="registerData.password" name="password" required placeholder="Create a password">
            </div>
            <button type="submit" class="btn btn-success w-100" [disabled]="isLoading">
              {{ isLoading ? 'Creating Account...' : 'Register' }}
            </button>
          </form>
          
          <hr class="my-4">
          <p class="text-center mb-0">
            Already have an account? <a routerLink="/login" class="text-decoration-none">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
